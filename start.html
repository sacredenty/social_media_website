<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socializers Launcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .launcher {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        .logo {
            font-size: 48px;
            color: #1877f2;
            margin-bottom: 20px;
        }
        h1 {
            color: #1c1e21;
            margin-bottom: 30px;
        }
        .button {
            display: block;
            width: 100%;
            padding: 15px 30px;
            margin: 10px 0;
            background: #1877f2;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .button:hover {
            background: #166fe5;
            transform: translateY(-2px);
        }
        .button.secondary {
            background: #42b72a;
        }
        .button.secondary:hover {
            background: #36a420;
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 10px;
            color: #606770;
        }
        .demo-creds {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
        }
        .demo-creds h3 {
            margin-top: 0;
            color: #1877f2;
        }
    </style>
</head>
<body>
    <div class="launcher">
        <div class="logo">
            <i class="fas fa-users"></i>
        </div>
        <h1>Welcome to Socializers</h1>
        
        <a href="index.html" class="button">
            <i class="fas fa-home"></i> Go to Main Feed
        </a>
        
        <a href="login.html" class="button secondary">
            <i class="fas fa-sign-in-alt"></i> Login / Register
        </a>
        
        <div class="info">
            <h3>🚀 Quick Start</h3>
            <p>Choose an option above to start using Socializers!</p>
            
            <div class="demo-creds">
                <h3>Demo Account</h3>
                <p><strong>Email:</strong> john.doe@example.com</p>
                <p><strong>Password:</strong> password123</p>
            </div>
            
            <p><small>💡 Tip: Use the demo account to explore all features immediately!</small></p>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
