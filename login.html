<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Socializers</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo i {
            font-size: 48px;
            color: #1877f2;
            margin-bottom: 10px;
        }
        
        .auth-logo span {
            font-size: 24px;
            font-weight: bold;
            color: #1c1e21;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }
        
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .auth-btn:hover {
            background: #166fe5;
        }
        
        .auth-btn.secondary {
            background: #e4e6eb;
            color: #1c1e21;
        }
        
        .auth-btn.secondary:hover {
            background: #d1d5db;
        }
        
        .auth-divider {
            text-align: center;
            margin: 20px 0;
            color: #65676b;
            font-size: 14px;
        }
        
        .auth-features {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }
        
        .auth-features li {
            padding: 10px 0;
            color: #65676b;
            font-size: 14px;
        }
        
        .auth-features i {
            margin-right: 8px;
            color: #1877f2;
        }
        
        .forgot-password {
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="auth-body" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
    <div class="auth-container" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
        <div class="auth-left">
            <div class="auth-logo">
                <i class="fas fa-users"></i>
                <span>Socializers</span>
            </div>
            <h2>Connect with friends and the world around you on Socializers.</h2>
            <ul class="auth-features">
                <li><i class="fas fa-share-alt"></i> Share photos and updates with friends</li>
                <li><i class="fas fa-video"></i> Watch videos and live streams</li>
                <li><i class="fas fa-gamepad"></i> Play games with your friends</li>
                <li><i class="fas fa-calendar"></i> Discover events and activities</li>
            </ul>
        </div>
        
        <div class="auth-right">
            <div class="auth-form">
                <h1>Login to Socializers</h1>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Email address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="auth-btn">Log In</button>
                </form>
                
                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <button class="auth-btn secondary" onclick="window.location.href='register.html'">
                    Create New Account
                </button>
                
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        // Force show login form
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔍 Login page DOM loaded');
            
            const authContainer = document.querySelector('.auth-container');
            const authForm = document.querySelector('.auth-form');
            
            if (authContainer) {
                console.log('✅ Auth container found:', authContainer);
                // Force show the container
                authContainer.style.display = 'block';
                authContainer.style.visibility = 'visible';
                authContainer.style.opacity = '1';
                authContainer.style.zIndex = '9999';
                console.log('✅ Forced auth container to be visible');
            } else {
                console.error('❌ Auth container not found');
            }
            
            if (authForm) {
                console.log('✅ Auth form found:', authForm);
                // Force show the form
                authForm.style.display = 'block';
                authForm.style.visibility = 'visible';
                authForm.style.opacity = '1';
                authForm.style.zIndex = '10000';
                console.log('✅ Forced auth form to be visible');
            } else {
                console.error('❌ Auth form not found');
            }
        });
        
        // Debug login form visibility
        console.log('🔍 Login page loaded');
        
        const authContainer = document.querySelector('.auth-container');
        const authForm = document.querySelector('.auth-form');
        
        if (authContainer) {
            console.log('✅ Auth container found:', authContainer);
            console.log('Auth container visible:', authContainer.style.display !== 'none');
            console.log('Auth container computed style:', window.getComputedStyle(authContainer).display);
        } else {
            console.error('❌ Auth container not found');
        }
        
        if (authForm) {
            console.log('✅ Auth form found:', authForm);
            console.log('Auth form visible:', authForm.style.display !== 'none');
            console.log('Auth form computed style:', window.getComputedStyle(authForm).display);
        } else {
            console.error('❌ Auth form not found');
        }
    </script>
    
    <script src="database.js"></script>
    <script src="app-oop-fixed.js"></script>
    <script src="auth.js"></script>
</body>
</html>
