<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Socializers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
    <div class="auth-container" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
        <div class="auth-left">
            <div class="auth-logo">
                <i class="fas fa-users"></i>
                <span>Socializers</span>
            </div>
            <h2>Connect with friends and the world around you on Socializers.</h2>
            <ul class="auth-features">
                <li><i class="fas fa-share-alt"></i> Share photos and updates with friends</li>
                <li><i class="fas fa-video"></i> Watch videos and live streams</li>
                <li><i class="fas fa-gamepad"></i> Play games with your friends</li>
                <li><i class="fas fa-calendar"></i> Discover events and activities</li>
            </ul>
        </div>
        
        <div class="auth-right">
            <div class="auth-form">
                <h1>Login to Socializers</h1>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Email address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="auth-btn">Log In</button>
                </form>
                
                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <button class="auth-btn secondary" onclick="window.location.href='register.html'">
                    Create New Account
                </button>
                
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        // Force show login form
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔍 Login page DOM loaded');
            
            const authContainer = document.querySelector('.auth-container');
            const authForm = document.querySelector('.auth-form');
            
            if (authContainer) {
                console.log('✅ Auth container found:', authContainer);
                // Force show the container
                authContainer.style.display = 'block';
                authContainer.style.visibility = 'visible';
                authContainer.style.opacity = '1';
                authContainer.style.zIndex = '9999';
                console.log('✅ Forced auth container to be visible');
            } else {
                console.error('❌ Auth container not found');
            }
            
            if (authForm) {
                console.log('✅ Auth form found:', authForm);
                // Force show the form
                authForm.style.display = 'block';
                authForm.style.visibility = 'visible';
                authForm.style.opacity = '1';
                authForm.style.zIndex = '10000';
                console.log('✅ Forced auth form to be visible');
            } else {
                console.error('❌ Auth form not found');
            }
        });
        
        // Debug login form visibility
        console.log('🔍 Login page loaded');
        
        const authContainer = document.querySelector('.auth-container');
        const authForm = document.querySelector('.auth-form');
        
        if (authContainer) {
            console.log('✅ Auth container found:', authContainer);
            console.log('Auth container visible:', authContainer.style.display !== 'none');
            console.log('Auth container computed style:', window.getComputedStyle(authContainer).display);
        } else {
            console.error('❌ Auth container not found');
        }
        
        if (authForm) {
            console.log('✅ Auth form found:', authForm);
            console.log('Auth form visible:', authForm.style.display !== 'none');
            console.log('Auth form computed style:', window.getComputedStyle(authForm).display);
        } else {
            console.error('❌ Auth form not found');
        }
    </script>
    
    <script src="auth.js"></script>
</body>
</html>
