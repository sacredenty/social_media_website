<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socializers - Connect with Friends</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-users"></i>
                <span>Socializers</span>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search friends, posts, and more..." onkeydown="if(event.key === 'Enter') { event.preventDefault(); if(typeof Search !== 'undefined') { Search.performSearch(this.value); } }">
                <i class="fas fa-search" onclick="if(typeof Search !== 'undefined') { Search.performSearch(document.getElementById('searchInput').value); }" style="cursor: pointer;"></i>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active"><i class="fas fa-home"></i></a>
                <a href="#" class="nav-link"><i class="fas fa-user-friends"></i></a>
                <a href="#" class="nav-link"><i class="fas fa-bell"></i></a>
                <a href="#" class="nav-link"><i class="fas fa-envelope"></i></a>
                <div class="nav-profile" onclick="showProfileMenu()">
                    <img src="https://picsum.photos/seed/user1/40/40" alt="Profile">
                    <span id="navProfileName">Loading...</span>
                    <i class="fas fa-caret-down"></i>
                </div>
                <div id="profileMenu" class="profile-menu" style="display: none;">
                    <a href="#" onclick="goToProfile()"><i class="fas fa-user"></i> View Profile</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Left Sidebar -->
        <aside class="left-sidebar">
            <div class="sidebar-section">
                <ul class="sidebar-menu">
                    <li><a href="#" class="menu-item active"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-user"></i> Profile</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-users"></i> Friends</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-images"></i> Photos</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-video"></i> Videos</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-calendar"></i> Events</a></li>
                    <li><a href="#" class="menu-item"><i class="fas fa-gamepad"></i> Games</a></li>
                </ul>
            </div>
        </aside>

        <!-- Center Content -->
        <main class="center-content">
            <!-- Create Post -->
            <div class="create-post">
                <div class="post-input-area">
                    <img src="https://picsum.photos/seed/user1/50/50" alt="Profile" class="post-profile-img">
                    <input type="text" placeholder="What's on your mind?" class="post-input">
                </div>
                <div class="post-options">
                    <button class="post-option"><i class="fas fa-video"></i> Live Video</button>
                    <button class="post-option"><i class="fas fa-image"></i> Photo/Video</button>
                    <button class="post-option"><i class="fas fa-smile"></i> Feeling/Activity</button>
                </div>
            </div>

            <!-- Posts Feed -->
            <div class="posts-container"></div>

            <!-- Stories -->
            <div class="stories-container">
                <div class="story-item create-story">
                    <div class="story-plus">+</div>
                    <span>Create Story</span>
                </div>
                <div class="story-item">
                    <img src="https://picsum.photos/seed/story1/150/200" alt="Story">
                    <span>Jane Smith</span>
                </div>
                <div class="story-item">
                    <img src="https://picsum.photos/seed/story2/150/200" alt="Story">
                    <span>Mike Johnson</span>
                </div>
                <div class="story-item">
                    <img src="https://picsum.photos/seed/story3/150/200" alt="Story">
                    <span>Sarah Williams</span>
                </div>
            </div>

            <!-- Posts Feed -->
            <div class="posts-feed" id="postsFeed">
                <!-- Posts will be dynamically loaded here -->
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="right-sidebar">
            <!-- Your Profile -->
            <div class="profile-card">
                <img src="https://picsum.photos/seed/user1/100/100" alt="Profile" class="profile-card-img">
                <h3 id="profileCardName">Loading...</h3>
                <p id="profileCardTitle">Loading...</p>
                <div class="profile-stats">
                    <div class="stat">
                        <span id="friendsCount">Loading...</span>
                        <span>Friends</span>
                    </div>
                    <div class="stat">
                        <span id="followersCount">Loading...</span>
                        <span>Followers</span>
                    </div>
                </div>
            </div>
            <script src="auth.js"></script>

            <!-- Suggestions -->
            <div class="suggestions-card">
                <h3>People You May Know</h3>
                <div id="suggestionsList">
                    <!-- Suggestions will be dynamically loaded here -->
                </div>
            </div>
        </aside>
    </div>

    <script src="database.js"></script>
    <script src="app-oop-fixed.js"></script>
    <script>
        // Fallback search function in case Search class isn't loaded yet
        function performSearch(query) {
            if (typeof Search !== 'undefined') {
                Search.performSearch(query);
            } else {
                console.error('Search class not yet loaded');
            }
        }
    </script>
</body>
</html>
